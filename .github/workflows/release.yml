name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit Build
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build dist for ${{ github.ref_name }}
          file_pattern: dist/

      - name: Update Tag
        run: |
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force
